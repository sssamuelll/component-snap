name: Create code review issues

on:
  push:
    branches:
      - claude/code-review-architecture-6LwBL

permissions:
  issues: write
  contents: read

jobs:
  create-issues:
    # Guarda: solo corre si el commit que disparó el push contiene la marca.
    # Así futuros pushes a la rama no re-crean issues.
    if: contains(github.event.head_commit.message, '[create-issues]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Create the 20 review issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 create_issues.py
